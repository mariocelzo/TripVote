name: CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Solo un'esecuzione CI alla volta per branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Test & Lint — prerequisito per il deploy Vercel (che parte da GitHub)
  # Vercel ascolta i push su main e fa il deploy automaticamente
  # dopo che questa CI è verde.
  # ---------------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check . && ruff format --check .

      - name: Tests (pytest + coverage)
        working-directory: backend
        run: pytest -q --cov=app --cov-fail-under=70
        env:
          # Env vars minime per i test — i segreti reali stanno su Vercel
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: test-key
          CLERK_JWKS_URL: https://test.clerk.accounts.dev/.well-known/jwks.json
          REDIS_URL: redis://localhost:6379
          SUPABASE_WEBHOOK_SECRET: test-webhook-secret
          CRON_SECRET: test-cron-secret
