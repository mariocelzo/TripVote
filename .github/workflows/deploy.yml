name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}   # consente trigger manuale dalla UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tripvote-api

# Solo un deploy alla volta
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements*.txt'

      - name: Install deps
        working-directory: backend
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check . && ruff format --check .

      - name: Tests (pytest + coverage)
        working-directory: backend
        run: pytest -q --cov=app --cov-fail-under=70

  # ---------------------------------------------------------------
  build-and-push:
    name: Build & Push GHCR
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ---------------------------------------------------------------
  deploy:
    name: Deploy to DigitalOcean
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: GITHUB_OWNER
          script: |
            set -euo pipefail
            cd /opt/tripvote

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export GITHUB_OWNER=${{ github.repository_owner }}

            docker compose pull api
            docker compose up -d api
            docker image prune -f

            # Health check (max 30s)
            for i in $(seq 1 10); do
              if curl -fsS http://localhost:8000/health > /dev/null; then
                echo "✅ Healthy at attempt $i"
                exit 0
              fi
              echo "Attempt $i failed, retrying in 3s..."
              sleep 3
            done

            echo "❌ Health check failed after 10 attempts"
            docker compose logs --tail=100 api
            exit 1
